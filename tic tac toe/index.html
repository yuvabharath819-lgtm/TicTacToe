<!DOCTYPE html>
<html>
<head>
    <title>Tic Tac Toe</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }

        h1 {
            color: #333;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 5px;
            justify-content: center;
            margin: 20px auto;
        }

        .cell {
            width: 100px;
            height: 100px;
            font-size: 40px;
            cursor: pointer;
            border: 2px solid black;
            background-color: #f0f0f0;
        }

        #status {
            font-size: 24px;
            margin: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Tic Tac Toe</h1>

    <div id="status">Player X's Turn</div>

    <div class="board">
        <button class="cell" onclick="play(this,0)"></button>
        <button class="cell" onclick="play(this,1)"></button>
        <button class="cell" onclick="play(this,2)"></button>
        <button class="cell" onclick="play(this,3)"></button>
        <button class="cell" onclick="play(this,4)"></button>
        <button class="cell" onclick="play(this,5)"></button>
        <button class="cell" onclick="play(this,6)"></button>
        <button class="cell" onclick="play(this,7)"></button>
        <button class="cell" onclick="play(this,8)"></button>
    </div>

    <button onclick="resetGame()">Restart Game</button>

    <script>
        let currentPlayer = "X";
        let board = ["", "", "", "", "", "", "", "", ""];
        let gameOver = false;

        const winPatterns = [
            [0,1,2], [3,4,5], [6,7,8],
            [0,3,6], [1,4,7], [2,5,8],
            [0,4,8], [2,4,6]
        ];

        function play(cell, index) {
            if (board[index] !== "" || gameOver) return;

            board[index] = currentPlayer;
            cell.textContent = currentPlayer;

            if (checkWinner()) {
                document.getElementById("status").textContent =
                    "Player " + currentPlayer + " Wins!";
                gameOver = true;
                return;
            }

            if (!board.includes("")) {
                document.getElementById("status").textContent = "It's a Draw!";
                gameOver = true;
                return;
            }

            currentPlayer = currentPlayer === "X" ? "O" : "X";
            document.getElementById("status").textContent =
                "Player " + currentPlayer + "'s Turn";
        }

        function checkWinner() {
            for (let pattern of winPatterns) {
                let [a, b, c] = pattern;

                if (
                    board[a] &&
                    board[a] === board[b] &&
                    board[a] === board[c]
                ) {
                    return true;
                }
            }
            return false;
        }

        function resetGame() {
            board = ["", "", "", "", "", "", "", "", ""];
            currentPlayer = "X";
            gameOver = false;

            document.getElementById("status").textContent =
                "Player X's Turn";

            document.querySelectorAll(".cell").forEach(cell => {
                cell.textContent = "";
            });
        }
    </script>

</body>
</html>
